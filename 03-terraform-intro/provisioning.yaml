groups:
  - name: epfl-ws-global-admins
    users:
      - aroux

applications:
  - name: epfl-ws-order-management
    permissions:
      admin:
        users: []
        groups:
          - epfl-ws-global-admins
      write:
        users:
          - lanzrein
        groups: []
    repositories:
      - name: api
        visibility: private
        description: "API for order management"
      - name: frontend
        visibility: public
        description: "Frontend for order management"
        rule_set:
          - name: main
            target_branch: main
            rules:
              pull_request:
                required_approving_review_count: 1
                required_conversation_resolution: true
                required_review_from_code_owners: true
              automatic_copilot_review:
                review_new_push: true
                review_draft_pull_request: false
